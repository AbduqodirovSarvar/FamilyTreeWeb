services:
  ui:
    image: ${DOCKER_USERNAME:-yourusername}/family-tree-ui:${IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./
      dockerfile: ./Dockerfile
    container_name: family-tree-ui
    restart: unless-stopped
    # Host port mapping ixtiyoriy — proxy ishlatsangiz 4401 tashqaridan kerak emas.
    # Lokal dev/debug uchun qoldirildi.
    ports:
      - "${UI_PORT:-4401}:80"
    networks:
      - global-net

networks:
  # `database` repo yaratgan tashqi network. Caddy proxy va boshqa servislar
  # shu network'da bo'lishi kerak — Caddy `family-tree-ui:80`'ga to'g'ridan-to'g'ri ulanadi.
  global-net:
    external: true
    name: global-app-network
