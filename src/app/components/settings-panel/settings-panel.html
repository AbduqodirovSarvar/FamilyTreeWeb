<div class="settings">
  <button
    type="button"
    class="btn"
    (click)="toggleTheme()"
    [attr.title]="themeLabel()"
    [attr.aria-label]="i18n.t('settings.theme') + ': ' + themeLabel()">
    @switch (themeIcon()) {
      @case ('sun') {
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/>
        </svg>
      }
      @case ('moon') {
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      }
      @default {
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="13" rx="2"/>
          <path d="M8 20h8M12 17v3"/>
        </svg>
      }
    }
  </button>

  <div class="lang-wrap">
    <button
      type="button"
      class="btn lang-btn"
      (click)="togglePanel()"
      [attr.aria-expanded]="open()"
      [attr.aria-label]="i18n.t('settings.language')">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
      </svg>
      <span class="code">{{ i18n.lang().toUpperCase() }}</span>
    </button>

    @if (open()) {
      <div class="popover" role="menu">
        @for (l of langs; track l.code) {
          <button
            type="button"
            class="popover-item"
            role="menuitemradio"
            [attr.aria-checked]="i18n.lang() === l.code"
            [class.active]="i18n.lang() === l.code"
            (click)="pickLang(l.code)">
            <span class="popover-code">{{ l.code.toUpperCase() }}</span>
            <span>{{ l.label }}</span>
            @if (i18n.lang() === l.code) {
              <svg viewBox="0 0 24 24" class="check" aria-hidden="true">
                <path d="M5 12l5 5L20 7"/>
              </svg>
            }
          </button>
        }
      </div>
    }
  </div>
</div>
